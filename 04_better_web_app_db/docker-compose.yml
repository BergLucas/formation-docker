name: web_app_db

services:
  app:
    image: web_app_db:latest
    build: .
    environment:
      - DATABASE_URL
    ports:
      - "8000:8000"
    networks:
      - db_network
    depends_on:
      - db

  db:
    image: postgres:17
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=app
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - db_network

volumes:
  db_data:

networks:
  db_network:
